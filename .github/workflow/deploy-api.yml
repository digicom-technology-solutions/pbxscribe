name: CI/CD Pipeline

on:
  push:
    branches: [main, "feature/*"]

permissions:
  id-token: write # Required for OIDC
  contents: read # Required for actions/checkout

jobs:
  # 1. Build and Test
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # 2. Deploy to Development
  deploy-dev:
    needs: build
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev # Links to GitHub Environment "dev"
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::920394711520:role/pbxscribe-api-backend-dev-github-deploy
          aws-region: us-east-1

      - name: Deploy to Dev
        run: |
          echo "Deploying pbxscribe-api-backend to DEV..."
          # Replace with your deployment command (e.g., sam deploy, serverless, or custom script)
          # npm run deploy:dev

